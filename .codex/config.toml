# Enable project-local Codex hooks for this repository.
# Hook definitions live in .codex/hooks.json.
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = true

[features]
hooks = true

# Keep the main session unchanged, but start common subagent roles without
# Codex Apps/connectors so their startup does not initialize codex_apps.
[agents.default]
description = "General-purpose subagent for delegated tasks."
config_file = "subagent-no-apps.toml"

[agents.worker]
description = "Execution subagent for implementation and production work."
config_file = "subagent-no-apps.toml"

[agents.explorer]
description = "Read-only codebase exploration subagent for well-scoped questions."
config_file = "subagent-no-apps.toml"

# BEGIN spectrack custom agents
# Generated by SpecTrack setup. Re-run `spectrack setup.py install-codex-agents` to refresh.

[agents."spectrack:implementation-auditor"]
description = "SpecTrack auditor that verifies an issue-implementer report against the issue, branch, commits, and Resume comment."
config_file = "spectrack/agents/implementation-auditor.toml"

[agents."spectrack:issue-implementer"]
description = "SpecTrack implementer for an approved task, bug, or spike approach; implements, verifies Acceptance Criteria, commits, and refreshes Resume."
config_file = "spectrack/agents/issue-implementer.toml"

[agents."spectrack:mock-html-generator"]
description = "SpecTrack mock generator for throwaway HTML/CSS screen mockups grounded in selected usecase issues."
config_file = "spectrack/agents/mock-html-generator.toml"

[agents."spectrack:resolution-auditor"]
description = "SpecTrack auditor that validates a recorded root cause and approach or fix against real code and git history."
config_file = "spectrack/agents/resolution-auditor.toml"

[agents."spectrack:task-size-auditor"]
description = "SpecTrack auditor that checks whether a task body is correctly sized or should be split, promoted, or decomposed."
config_file = "spectrack/agents/task-size-auditor.toml"

[agents."spectrack:usecase-explorer"]
description = "SpecTrack explorer that finds candidate use cases missed by an existing set of workflow usecase issues."
config_file = "spectrack/agents/usecase-explorer.toml"

[agents."spectrack:usecase-reviewer"]
description = "SpecTrack reviewer that publishes review issues for quality findings in workflow usecase issues."
config_file = "spectrack/agents/usecase-reviewer.toml"
# END spectrack custom agents
