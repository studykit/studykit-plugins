version: 1
mode: remote-native
providers:
  issues:
    kind: github
    repo: studykit/studykit-plugins
    labels:
    - name: task
      color: 0E8A16
      description: Workflow implementation task
    - name: bug
      color: d73a4a
      description: Something isn't working
    - name: spike
      color: 5319e7
      description: SpecTrack spike issue
    - name: epic
      color: 1D76DB
      description: Workflow epic or parent work item
    - name: review
      color: 0e8a16
      description: SpecTrack review issue
    - name: usecase
      color: fbca04
      description: SpecTrack use case issue
    - name: research
      color: 5319E7
      description: Workflow research or investigation
    - name: documentation
      color: 0075ca
      description: Improvements or additions to documentation
    - name: duplicate
      color: cfd3d7
      description: This issue or pull request already exists
    - name: enhancement
      color: a2eeef
      description: New feature or request
    - name: good first issue
      color: 7057ff
      description: Good for newcomers
    - name: help wanted
      color: 008672
      description: Extra attention is needed
    - name: invalid
      color: e4e669
      description: This doesn't seem right
    - name: question
      color: d876e3
      description: Further information is requested
    - name: wontfix
      color: ffffff
      description: This will not be worked on
    - name: story
      color: 0E8A16
      description: Job Story
    - name: requirement
      color: 0E8A16
      description: Functional requirement
    - name: feedback
      color: ededed
    - name: plugin:workflow
      color: 5319E7
      description: Work for the provider-backed workflow plugin
  knowledge:
    kind: github
    repo: studykit/studykit-plugins
    path: wiki/spectrack
issue_id_format: github
commit_refs:
  enabled: true
  style: provider-native
